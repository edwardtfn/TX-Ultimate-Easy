####################################################################################################
#####                              TX Ultimate Easy for ESPHome                                #####
#####                  Repository: https://github.com/edwardtfn/TX-Ultimate-Easy               #####
##### Purpose: ESPHome - ESP-NOW Communication for Multi-Device Relay Control                  #####
####################################################################################################
##### Author: edwardtfn - https://github.com/edwardtfn - https://buymeacoffee.com/edwardfirmo  #####
####################################################################################################
##### NOTE:                                                                                    #####
##### - Make changes ONLY if absolutely necessary and you have the required knowledge.         #####
##### - For normal system use, modifications to this file are NOT required.                    #####
####################################################################################################
---
substitutions:
  TAG_ESPNOW: tx_ultimate_easy.espnow
  espnow_target_mac_button_1: "00:00:00:00:00:00"
  espnow_target_relay_button_1: 1
  espnow_target_mac_button_2: "00:00:00:00:00:00"
  espnow_target_relay_button_2: 1
  espnow_target_mac_button_3: "00:00:00:00:00:00"
  espnow_target_relay_button_3: 1
  espnow_target_mac_button_4: "00:00:00:00:00:00"
  espnow_target_relay_button_4: 1

esphome:
  platformio_options:
    build_flags:
      - -D TX_ULTIMATE_EASY_ESPNOW
    includes:
      - esp_mac.h

globals:
  - id: espnow_send_enabled
    type: bool
    restore_value: true
    initial_value: false

  - id: espnow_receive_enabled
    type: bool
    restore_value: true
    initial_value: false

espnow:
  id: espnow_component
  auto_add_peer: true
  on_receive:
    lambda: |-
      if (!id(espnow_receive_enabled)) {
        ESP_LOGD("${TAG_ESPNOW}", "ESP-NOW receiving disabled, ignoring message");
        return;
      }

      if (data == nullptr || size < 2) {
        if (data == nullptr) {
          ESP_LOGW("${TAG_ESPNOW}", "Received ESP-NOW message with null data pointer");
        }
        return;
      }

      uint8_t command = data[0];
      uint8_t relay_num = data[1];

      ESP_LOGI("${TAG_ESPNOW}", "ESP-NOW message received: command=0x%02X, relay=%" PRIu8, command, relay_num);

      if (command == 0x01 && relay_num >= 1 && relay_num <= 4) {
        ESP_LOGI("${TAG_ESPNOW}", "Toggling relay %" PRIu8, relay_num);
        switch (relay_num) {
          case 1:
            id(sw_relay_1)->toggle();
            break;
          case 2:
            id(sw_relay_2)->toggle();
            break;
          case 3:
            id(sw_relay_3)->toggle();
            break;
          case 4:
            id(sw_relay_4)->toggle();
            break;
        }
      } else {
        ESP_LOGW("${TAG_ESPNOW}", "Invalid message format (command=0x%02X, relay=%" PRIu8 ")", command, relay_num);
      }

script:
  - id: espnow_send
    mode: single
    parameters:
      button: uint8_t
    then:
      - delay: 100ms
      - if:
          condition:
            lambda: |-
              if (!id(espnow_send_enabled)) {
                return false;
              }
              std::string mac_str;
              switch (button) {
                case 1:
                  mac_str = "${espnow_target_mac_button_1}";
                  break;
                case 2:
                  mac_str = "${espnow_target_mac_button_2}";
                  break;
                case 3:
                  mac_str = "${espnow_target_mac_button_3}";
                  break;
                case 4:
                  mac_str = "${espnow_target_mac_button_4}";
                  break;
                default:
                  return false;
              }
              // Skip ESP-NOW if MAC is empty or all zeros
              return !mac_str.empty() && mac_str != "00:00:00:00:00:00";
          then:
            - lambda: |-
                std::string mac_str;
                uint8_t relay_num;
                switch (button) {
                  case 1:
                    mac_str = "${espnow_target_mac_button_1}";
                    relay_num = ${espnow_target_relay_button_1};
                    break;
                  case 2:
                    mac_str = "${espnow_target_mac_button_2}";
                    relay_num = ${espnow_target_relay_button_2};
                    break;
                  case 3:
                    mac_str = "${espnow_target_mac_button_3}";
                    relay_num = ${espnow_target_relay_button_3};
                    break;
                  case 4:
                    mac_str = "${espnow_target_mac_button_4}";
                    relay_num = ${espnow_target_relay_button_4};
                    break;
                  default:
                    return;
                }
                // Default relay to 1 if not in valid range (1-4)
                if (relay_num < 1 || relay_num > 4) {
                  relay_num = 1;
                }
                ESP_LOGI("${TAG_ESPNOW}", "Sending ESP-NOW message: button=%" PRIu8 ", MAC=%s, relay=%" PRIu8, button, mac_str.c_str(), relay_num);
            - espnow.send:
                id: espnow_component
                address: !lambda |-
                  std::string mac_str;
                  switch (button) {
                    case 1:
                      mac_str = "${espnow_target_mac_button_1}";
                      break;
                    case 2:
                      mac_str = "${espnow_target_mac_button_2}";
                      break;
                    case 3:
                      mac_str = "${espnow_target_mac_button_3}";
                      break;
                    case 4:
                      mac_str = "${espnow_target_mac_button_4}";
                      break;
                    default:
                      return {0x00, 0x00, 0x00, 0x00, 0x00, 0x00};
                  }
                  std::transform(mac_str.begin(), mac_str.end(), mac_str.begin(), ::toupper);
                  int values[6];
                  if (sscanf(mac_str.c_str(), "%02X:%02X:%02X:%02X:%02X:%02X",
                             &values[0], &values[1], &values[2],
                             &values[3], &values[4], &values[5]) == 6) {
                    return {static_cast<uint8_t>(values[0]), static_cast<uint8_t>(values[1]),
                            static_cast<uint8_t>(values[2]), static_cast<uint8_t>(values[3]),
                            static_cast<uint8_t>(values[4]), static_cast<uint8_t>(values[5])};
                  }
                  return {0x00, 0x00, 0x00, 0x00, 0x00, 0x00};
                data: !lambda |-
                  uint8_t relay_num;
                  switch (button) {
                    case 1:
                      relay_num = ${espnow_target_relay_button_1};
                      break;
                    case 2:
                      relay_num = ${espnow_target_relay_button_2};
                      break;
                    case 3:
                      relay_num = ${espnow_target_relay_button_3};
                      break;
                    case 4:
                      relay_num = ${espnow_target_relay_button_4};
                      break;
                    default:
                      return {0x00, 0x00};
                  }
                  // Default relay to 1 if not in valid range (1-4)
                  if (relay_num < 1 || relay_num > 4) {
                    relay_num = 1;
                  }
                  return {0x01, relay_num};
                wait_for_sent: false

  - id: !extend button_click_event
    then:
      - lambda: |-
          if (!id(espnow_send_enabled)) {
            return;
          }
          espnow_send->execute(button);

switch:
  - id: sw_espnow_send_enabled
    name: ESP-NOW Send Enabled
    platform: template
    optimistic: true
    restore_mode: restore_default_off
    internal: false
    entity_category: config
    icon: mdi:radio
    on_turn_on:
      then:
        - lambda: |-
            id(espnow_send_enabled) = true;
            ESP_LOGI("${TAG_ESPNOW}", "ESP-NOW sending enabled");
    on_turn_off:
      then:
        - lambda: |-
            id(espnow_send_enabled) = false;
            ESP_LOGI("${TAG_ESPNOW}", "ESP-NOW sending disabled");

  - id: sw_espnow_receive_enabled
    name: ESP-NOW Receive Enabled
    platform: template
    optimistic: true
    restore_mode: restore_default_off
    internal: false
    entity_category: config
    icon: mdi:radio
    on_turn_on:
      then:
        - lambda: |-
            id(espnow_receive_enabled) = true;
            ESP_LOGI("${TAG_ESPNOW}", "ESP-NOW receiving enabled");
    on_turn_off:
      then:
        - lambda: |-
            id(espnow_receive_enabled) = false;
            ESP_LOGI("${TAG_ESPNOW}", "ESP-NOW receiving disabled");

text_sensor:
  - platform: wifi_info
    mac_address:
      name: ESP-NOW MAC Address
      entity_category: diagnostic
      icon: mdi:radio
