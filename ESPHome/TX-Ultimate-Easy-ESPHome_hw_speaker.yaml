  TAG_HW_SPEAKER: tx_ultimate_easy.hw.speaker

packages:
  hw_audio: !include TX-Ultimate-Easy-ESPHome_hw_audio.yaml

api:
  actions:
    - action: rtttl_play
      variables:
        # The RTTTL string for the melody to be played.
        # It should follow the RTTTL format, including the melody's name,
        # default settings, and a sequence of notes.
        tone: string
      then:
        - lambda: |-
            rtttl_speaker->stop();
            if (speaker_volume->state > 0) {
              ESP_LOGI("${TAG_HW_SPEAKER}", "Play tone: '%s'", tone.c_str());
              rtttl_speaker->play(tone.c_str());
            }

esphome:
  platformio_options:
    build_flags:
      - -D TX_ULTIMATE_EASY_HW_SPEAKER

number:
  - id: speaker_volume
    name: Speaker Volume
    platform: template
    max_value: 100
    min_value: 0
    step: 1
    initial_value: 100
    unit_of_measurement: "%"
    internal: false
    disabled_by_default: true
    entity_category: config
    device_class: sound_pressure
    restore_value: true
    optimistic: true
    set_action:
      then:
        - lambda: |-
            speaker_embedded->set_volume(x/100.0f);
            static const std::string tone_volume_change = "${tone_volume_change}";
            // Play sound if tone_volume_change is not "none"
            if (x > 0 and !tone_volume_change.empty() and tone_volume_change != "none")
              rtttl_speaker->play(tone_volume_change);

rtttl:
  - id: rtttl_speaker
    speaker: speaker_embedded

script:
  - id: !extend boot_done
    then:
      - script.execute: speaker_setup

  - id: !extend dump_config_list_packages
    then:
      - script.wait: dump_config
      - lambda: |-
          // Check for requirements
          #ifndef TX_ULTIMATE_EASY_COMMON
            #error "The package TX-Ultimate-Easy-ESPHome_common.yaml is required."
          #endif
          #ifndef TX_ULTIMATE_EASY_HW_AUDIO
            #error "The package TX-Ultimate-Easy-ESPHome_hw_audio.yaml is required."
          #endif

          // Identify itself
          ESP_LOGCONFIG(ESPHOME_PROJECT_NAME, "  - Hardware - Speaker");

  - id: speaker_play_click
    then:
      - speaker.play:
          id: speaker_embedded
          data: ${click_sound_data}

  - id: speaker_setup
    then:
      - if:
          condition:
            select.is:
              id: sl_touch_speaker_feedback
              options:
                - "On press"
                - "On release"
                - "Always"
          then:
            - lambda: speaker_embedded->start();
          else:
            - lambda: speaker_embedded->stop();

  - id: !extend touch_on_multi_touch_release
    then:
      - script.execute: touch_on_multi_touch_release_speaker

  - id: touch_on_multi_touch_release_speaker
    mode: restart
    then:
      - lambda: |-
          // Remove this after ESPHome v2026.1.0 is released
          #if ESPHOME_VERSION_CODE >= VERSION_CODE(2026, 0, 0)  // Code for ESPHome newer than v2026.0.0
          if (sl_touch_speaker_feedback->current_option() != "Disabled") {
            speaker_play_click->execute();
          }
          #else
          if (strcmp(sl_touch_speaker_feedback->current_option(), "Disabled") != 0) {
            speaker_play_click->execute();
          }
          #endif

  - id: !extend touch_on_press
    then:
      - script.execute: touch_on_press_speaker

  - id: touch_on_press_speaker
    mode: restart
    then:
      - lambda: |-
          // Remove this after ESPHome v2026.1.0 is released
          #if ESPHOME_VERSION_CODE >= VERSION_CODE(2026, 0, 0)  // Code for ESPHome newer than v2026.0.0
          if (sl_touch_speaker_feedback->current_option() == "On press" or
              sl_touch_speaker_feedback->current_option() == "Always") {
            speaker_play_click->execute();
          }
          #else
          if (strcmp(sl_touch_speaker_feedback->current_option(), "On press") == 0 or
              strcmp(sl_touch_speaker_feedback->current_option(), "Always") == 0) {
            speaker_play_click->execute();
          }
          #endif

  - id: !extend touch_on_release
    then:
      - script.execute: touch_on_release_speaker

  - id: touch_on_release_speaker
    mode: restart
    then:
      - lambda: |-
          // Remove this after ESPHome v2026.1.0 is released
          #if ESPHOME_VERSION_CODE >= VERSION_CODE(2026, 0, 0)  // Code for ESPHome newer than v2026.0.0
          if (sl_touch_speaker_feedback->current_option() == "On release" or
              sl_touch_speaker_feedback->current_option() == "Always") {
            speaker_play_click->execute();
          }
          #else
          if (strcmp(sl_touch_speaker_feedback->current_option(), "On release") == 0 or
              strcmp(sl_touch_speaker_feedback->current_option(), "Always") == 0) {
            speaker_play_click->execute();
          }
          #endif

select:
  - id: sl_touch_speaker_feedback
    name: Touch - Speaker feedback
    platform: template
    options:
      - "Disabled"
      - "On press"
      - "On release"
      - "Always"
    initial_option: "Disabled"
    optimistic: true
    restore_value: true
    internal: false
    entity_category: config
    disabled_by_default: false
    icon: mdi:vibrate
    on_value:
      then:
        - script.execute: speaker_setup

speaker:
  - id: speaker_embedded
    platform: i2s_audio
    dac_type: external
    i2s_dout_pin: GPIO15
    i2s_audio_id: if_i2s_audio
    i2s_comm_fmt: stand_msb
    channel: mono
    timeout: never
...
