####################################################################################################
#####                              TX Ultimate Easy for ESPHome                                #####
#####                  Repository: https://github.com/ghigo/TX-Ultimate-Easy                   #####
####################################################################################################
##### Purpose: Night Mode — persistent LED/vibration/sound override                            #####
#####                                                                                          #####
##### All "Night Mode" entities appear together on the HA device page.                         #####
##### Main switch has no entity_category (prominent).                                          #####
##### Setting entities use entity_category: config (grouped under Configuration).              #####
####################################################################################################
---
esphome:
  on_boot:
    # priority: -200 ensures all hardware components are ready before we touch LEDs.
    priority: -200
    then:
      - if:
          condition:
            lambda: "return sw_night_mode->state;"
          then:
            - script.execute: night_mode_apply
  platformio_options:
    build_flags:
      - -D TX_ULTIMATE_EASY_NIGHT_MODE

globals:
  # ─── LED color/brightness snapshot ─ persists across reboots so the color ───
  # ─── can be re-applied without depending on the light partition state.    ───
  # ─── Stored as uint8_t (0-255) to save NVS space; converted to/from the    ───
  # ─── 0.0-1.0 float range used by the light component at runtime.           ───
  - id: night_mode_red
    type: uint8_t
    restore_value: true
    initial_value: '204'  # 0.8 * 255
  - id: night_mode_green
    type: uint8_t
    restore_value: true
    initial_value: '128'  # 0.5 * 255 (rounded)
  - id: night_mode_blue
    type: uint8_t
    restore_value: true
    initial_value: '0'    # 0.0 * 255
  - id: night_mode_brightness
    type: uint8_t
    restore_value: true
    initial_value: '26'   # 0.1 * 255 (rounded)

light:
  # Dedicated configuration light for night mode color/brightness.
  # Appears under "Configuration" in the HA device page.
  # lights_all is intentionally left untouched by night mode.
  - id: light_night_mode
    name: "Night Mode - Color"
    platform: partition
    icon: mdi:weather-night
    restore_mode: RESTORE_DEFAULT_OFF
    segments:
      - id: light_full
        from: 0
        to: ${LIGHT_MAX_ADDR}

script:
  # Apply the stored night mode color/brightness to the night mode light.
  # Waits for relay boot initialization so it is safe to call from on_boot.
  - id: night_mode_apply
    then:
      - script.wait: boot_initialize_relays
      # Re-check the flag: night mode may have been disabled while we were waiting.
      - if:
          condition:
            lambda: "return sw_night_mode->state;"
          then:
            - light.turn_on:
                id: light_night_mode
                red: !lambda "return id(night_mode_red) / 255.0f;"
                green: !lambda "return id(night_mode_green) / 255.0f;"
                blue: !lambda "return id(night_mode_blue) / 255.0f;"
                brightness: !lambda "return id(night_mode_brightness) / 255.0f;"
                transition_length: 500ms

switch:
  # ── Main control (no entity_category → appears in main entity list) ───────
  - id: sw_night_mode
    name: "Night Mode"
    platform: template
    icon: mdi:weather-night
    internal: false
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - lambda: |-
            // Snapshot light_night_mode so color/brightness can be restored after a reboot
            // (globals persist; partition light state does not).
            // Only overwrite stored values when the light is on - this preserves a
            // pre-configured color that was saved before the light was turned off.
            // Values are scaled from 0.0-1.0 float to 0-255 uint8_t for compact NVS storage.
            if (id(light_night_mode).current_values.is_on()) {
              id(night_mode_red) = static_cast<uint8_t>(id(light_night_mode).current_values.get_red() * 255.0f + 0.5f);  // add 0.5 for rounding to nearest integer
              id(night_mode_green) = static_cast<uint8_t>(id(light_night_mode).current_values.get_green() * 255.0f + 0.5f);
              id(night_mode_blue) = static_cast<uint8_t>(id(light_night_mode).current_values.get_blue() * 255.0f + 0.5f);
              id(night_mode_brightness) = static_cast<uint8_t>(id(light_night_mode).current_values.get_brightness() * 255.0f + 0.5f);
            }
            night_mode_apply->execute();
    on_turn_off:
      then:
        - lambda: |-
            // No need to clear the snapshot values - they will be overwritten next time night mode is enabled.
            night_mode_apply->stop();  // stop in case we're in the middle of a transition
            light_night_mode->turn_off();
            show_relay_status->execute();  // re-evaluate all relay indicators

  # ── Settings (entity_category: config → grouped under "Configuration") ────
  - id: sw_night_mode_suppress_vibration
    name: "Night Mode - Suppress Vibration"
    platform: template
    entity_category: config
    icon: mdi:vibrate-off
    internal: false
    restore_mode: RESTORE_DEFAULT_OFF

  - id: sw_night_mode_suppress_sound
    name: "Night Mode - Suppress Sound"
    platform: template
    entity_category: config
    icon: mdi:volume-off
    internal: false
    restore_mode: RESTORE_DEFAULT_OFF
...
